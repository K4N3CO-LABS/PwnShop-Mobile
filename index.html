<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#10b981" />
    <link rel="icon" type="image/png" href="https://i.postimg.cc/tZsyNg6D/Screenshot-2026-05-04-at-6-11-06-PM.png" />
    <link rel="manifest" href="./manifest.json" />
    <title>PwnShop Mobile</title>

  </head>
  <body class="bg-black" style="background-color: #000; margin: 0; padding: 0; height: 100vh; overflow: hidden; -webkit-tap-highlight-color: transparent;">
    <div id="static-splash" style="background-color:#000;position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;font-family:'Space Grotesk',ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;transition:opacity 0.8s ease-in-out;opacity:1;pointer-events:all;">
      <canvas id="matrix-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:-1;opacity:0.6;"></canvas>
      <div style="position:relative;margin-bottom:48px;">
        <div style="position:absolute;inset:0;background:rgba(16,185,129,0.3);filter:blur(32px);border-radius:50%;width:120px;height:120px;top:50%;left:50%;transform:translate(-50%,-50%);animation:splash-pulse-glow 2s ease-in-out infinite;"></div>
        <div style="position:relative;width:140px;height:140px;border-radius:28px;overflow:hidden;border:2px solid rgba(16,185,129,0.6);box-shadow:0 0 40px rgba(16,185,129,0.4);background:#0a0a0a;animation:splash-pulse-scale 3s ease-in-out infinite, logo-emerald-pulse 2s ease-in-out infinite;">
          <img src="https://i.postimg.cc/tZsyNg6D/Screenshot-2026-05-04-at-6-11-06-PM.png" alt="Logo" style="width:100%;height:100%;object-fit:cover;">
        </div>
      </div>
      <div style="width:300px;">
        <div id="loading-container">
          <div style="display:flex;justify-content:space-between;margin-bottom:12px;font-size:11px;text-transform:uppercase;letter-spacing:0.15em;color:#10b981;font-weight:600;">
            <span id="static-status">Initializing System...</span>
          </div>
          <div style="height:6px;width:100%;background:#111;border-radius:99px;border:1px solid rgba(255,255,255,0.08);overflow:hidden;box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);">
            <div id="static-bar" style="height:100%;background:linear-gradient(90deg, #059669, #10b981);width:0%;transition:width 0.1s linear;box-shadow: 0 0 12px rgba(16,185,129,0.6);"></div>
          </div>
        </div>
        <div id="enter-container" style="display:none;opacity:0;transition:opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);">
          <button id="enter-btn" style="background:#10b981;color:#000;border:none;padding:14px 28px;border-radius:14px;font-family:inherit;font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em;cursor:pointer;width:100%;box-shadow:0 0 35px rgba(16,185,129,0.5);transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);outline:none;-webkit-tap-highlight-color:transparent;animation:splash-btn-pulse 2s infinite ease-in-out;">
            ENTER PWNSHOP
          </button>
        </div>
        <div style="margin-top:40px;text-align:center;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.4em;font-weight:600;">
          Secure Protocol Enabled • AI Powered
        </div>
        <div class="splash-glitch" data-text="Developed by K4N3C0.LABS" style="margin-top:15vh;text-align:center;font-size:11px;color:#10b981;text-transform:uppercase;letter-spacing:0.3em;font-weight:700;display:block;">
          Developed by K4N3C0.LABS
        </div>
      </div>
      <style>
        
        @keyframes splash-pulse-glow { 0%, 100% { opacity: 0.3; transform: translate(-50%,-50%) scale(1); } 50% { opacity: 0.6; transform: translate(-50%,-50%) scale(1.1); } }
        @keyframes splash-pulse-scale { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        @keyframes logo-emerald-pulse { 0%, 100% { border-color: rgba(16,185,129,0.6); box-shadow: 0 0 40px rgba(16,185,129,0.4); } 50% { border-color: rgba(16,185,129,1); box-shadow: 0 0 60px rgba(16,185,129,0.8); } }
        @keyframes splash-btn-pulse { 
          0%, 100% { transform: scale(1); box-shadow: 0 0 35px rgba(16,185,129,0.5); } 
          50% { transform: scale(1.04); box-shadow: 0 0 50px rgba(16,185,129,0.8); } 
        }
        #enter-btn:hover { background: #34d399; }
        #enter-btn:active { transform: scale(0.96) !important; box-shadow: 0 0 20px rgba(16,185,129,0.3) !important; }
               .splash-glitch { position: relative; display: inline-block; animation: static-flicker 3s infinite; }
        .splash-glitch::before, .splash-glitch::after {
          content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          background: #020804;
        }
        .splash-glitch::before {
          left: 3px; text-shadow: -2px 0 red, 2px 0 rgba(0,255,0,0.5);
          clip-path: inset(10% 0 80% 0);
          animation: glitch-anim-1-splash 3s infinite linear;
        }
        .splash-glitch::after {
          left: -3px; text-shadow: -2px 0 blue;
          clip-path: inset(80% 0 10% 0);
          animation: glitch-anim-2-splash 3s infinite linear;
        }
        @keyframes static-flicker {
          0%, 50% { opacity: 1; transform: translateX(0); }
          52% { opacity: 0.8; transform: translateX(-3px); }
          60% { opacity: 0.9; transform: translateX(3px); }
          72% { opacity: 1; transform: translateX(-1px); }
          85% { opacity: 0.6; transform: translateX(5px); }
          100% { opacity: 1; transform: translateX(0); }
        }
        @keyframes glitch-anim-1-splash {
          0%, 50% { opacity: 0; }
          50.1% { opacity: 1; clip-path: inset(20% 0 80% 0); transform: translate(-4px, 2px); }
          60% { opacity: 1; clip-path: inset(60% 0 10% 0); transform: translate(4px, -2px); }
          72% { opacity: 1; clip-path: inset(40% 0 50% 0); transform: translate(-4px, 3px); }
          85% { opacity: 1; clip-path: inset(80% 0 5% 0); transform: translate(4px, -3px); }
          100% { opacity: 1; clip-path: inset(10% 0 70% 0); transform: translate(-4px, 2px); }
        }
        @keyframes glitch-anim-2-splash {
          0%, 50% { opacity: 0; }
          50.1% { opacity: 1; clip-path: inset(10% 0 60% 0); transform: translate(4px, -2px); }
          60% { opacity: 1; clip-path: inset(30% 0 20% 0); transform: translate(-4px, 3px); }
          72% { opacity: 1; clip-path: inset(70% 0 10% 0); transform: translate(4px, -3px); }
          85% { opacity: 1; clip-path: inset(20% 0 50% 0); transform: translate(-4px, 2px); }
          100% { opacity: 1; clip-path: inset(50% 0 30% 0); transform: translate(4px, -2px); }
        }
      </style>
    </div>
    <script>
      (function() {
        var splash = document.getElementById('static-splash');
        var bar = document.getElementById('static-bar');
        var status = document.getElementById('static-status');
        var p = 0;
        var stages = [
          'Booting secure kernel...', 
          'Connecting to encrypted DB...',
          'Injecting dependencies...', 
          'Validating hardware keys...', 
          'Establishing VPN tunnel...', 
          'Syncing session state...',
          'Loading high-res assets...', 
          'Optimizing UI components...',
          'Finalizing environment...',
          'System ready.'
        ];
        
        window._splashStartTime = Date.now();
        var targetDuration = 4000;
        
        var interval = setInterval(function() {
          var elapsed = Date.now() - window._splashStartTime;
          p = Math.min((elapsed / targetDuration) * 100, 98);
          
          if (bar) bar.style.width = p + '%';
          if (status) {
            var idx = Math.floor((p/100) * stages.length);
            status.innerText = stages[Math.min(idx, stages.length - 1)];
          }
        }, 30);

        var matrixInterval;
        // Matrix Rain
        (function() {
          var canvas = document.getElementById('matrix-canvas');
          if(!canvas) return;
          var ctx = canvas.getContext('2d');
          if(!ctx) return;
          var width = canvas.width = window.innerWidth;
          var height = canvas.height = window.innerHeight;
          var columns = Math.floor(width / 20);
          var drops = [];
          for (var i = 0; i < columns; i++) drops[i] = 1;
          function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#34d399';
            ctx.font = '15px monospace';
            for (var i = 0; i < drops.length; i++) {
                var text = String.fromCharCode(Math.random() * 128);
                ctx.fillText(text, i * 20, drops[i] * 20);
                if (drops[i] * 20 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
          }
          matrixInterval = setInterval(draw, 45);
          window.addEventListener('resize', function() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / 20);
            drops = [];
            for (var i = 0; i < columns; i++) drops[i] = 1;
          });
        })();

        window.hideSplash = function() {
           if (window._splashHidden) return;
           window._splashHidden = true;
           
           var minDuration = 1500;
           var elapsed = Date.now() - window._splashStartTime;
           var remaining = Math.max(0, minDuration - elapsed);
           
           setTimeout(function() {
             clearInterval(interval);
             if (bar) bar.style.width = '100%';
             if (status) status.innerText = 'System ready.';
             
             setTimeout(function() {
               var loadingContainer = document.getElementById('loading-container');
               var enterContainer = document.getElementById('enter-container');
               var enterBtn = document.getElementById('enter-btn');
               
               if (loadingContainer) loadingContainer.style.display = 'none';
               if (enterContainer) {
                 enterContainer.style.display = 'block';
                 setTimeout(function() {
                   enterContainer.style.opacity = '1';
                 }, 50);
               }
               
               if (enterBtn) {
                 enterBtn.onclick = function() {
                   if (splash) {
                     splash.style.opacity = '0';
                     if (matrixInterval) clearInterval(matrixInterval);
                     setTimeout(function() { 
                       if(splash.parentNode) splash.remove();
                     }, 800);
                   }
                 };
               }
             }, 800);
           }, remaining);
        };
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
