<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#10b981" />
    <link rel="icon" type="image/png" href="https://i.postimg.cc/jnyfsfBd/Screenshot-20260502-163238-Bazaart.jpg" />
    <link rel="manifest" href="/manifest.json" />
    <title>PwnShop Mobile</title>
    <style>
      #loader-feedback {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0,0,0,0.8);
        color: #ff4444;
        padding: 15px;
        border-radius: 10px;
        font-family: sans-serif;
        font-size: 14px;
        display: none;
        z-index: 9999;
        border: 1px solid #ff4444;
      }
    </style>
  </head>
  <body class="bg-black">
    <div id="root"></div>
    <div id="loader-feedback">
      <b>PwnShop Mobile Error:</b> Application failed to initialize within 5 seconds. This might be due to a JavaScript error or an incompatible environment.
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Diagnostic script for white screen
      setTimeout(function() {
        if (!document.querySelector('#root').hasChildNodes()) {
          var fb = document.getElementById('loader-feedback');
          if (fb) {
            fb.style.display = 'block';
            if (window.location.protocol === 'file:' && !window.location.pathname.endsWith('PwnShop_Playable.html')) {
              fb.innerHTML = "<b>Setup Required:</b> You are trying to run the raw source code. Please open the terminal, run <code>npm install</code> then <code>npm run dev</code>. <br><br><b>Or better yet:</b> Open the generated <b>PwnShop_Playable.html</b> file instead to play directly without setup!";
            } else {
              fb.innerHTML = "<b>PwnShop Mobile Error:</b> Application failed to initialize within 5 seconds. Check the browser console (F12) for more errors.";
            }
          }
          console.error("App failed to load. Check console.");
        }
      }, 5000);
      window.onerror = function(m, s, l) {
        var fb = document.getElementById('loader-feedback');
        if (fb) {
          fb.style.display = 'block';
          fb.innerHTML = "<b>Critical Error:</b> " + m + " (" + s + ":" + l + ")";
        }
      };
    </script>
  </body>
</html>
