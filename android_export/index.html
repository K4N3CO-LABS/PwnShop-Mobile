    <script>
      (function() {
        var splash = document.getElementById('static-splash');
        var bar = document.getElementById('static-bar');
        var status = document.getElementById('static-status');
        var p = 0;
        var stages = [
          'Booting secure kernel...', 
          'Connecting to encrypted DB...',
          'Injecting dependencies...', 
          'Validating hardware keys...', 
          'Establishing VPN tunnel...', 
          'Syncing session state...',
          'Loading high-res assets...', 
          'Optimizing UI components...',
          'Finalizing environment...',
          'System ready.'
        ];
        
        window._splashStartTime = Date.now();
        var targetDuration = 4000;
        
        var interval = setInterval(function() {
          var elapsed = Date.now() - window._splashStartTime;
          p = Math.min((elapsed / targetDuration) * 100, 98);
          
          if (bar) bar.style.width = p + '%';
          if (status) {
            var idx = Math.floor((p/100) * stages.length);
            status.innerText = stages[Math.min(idx, stages.length - 1)];
          }
        }, 30);

        var matrixInterval;
        // Matrix Rain
        (function() {
          var canvas = document.getElementById('matrix-canvas');
          if(!canvas) return;
          var ctx = canvas.getContext('2d');
          var width = canvas.width = window.innerWidth;
          var height = canvas.height = window.innerHeight;
          var columns = Math.floor(width / 20);
          var drops = [];
          for (var i = 0; i < columns; i++) drops[i] = 1;
          function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#34d399';
            ctx.font = '15px monospace';
            for (var i = 0; i < drops.length; i++) {
                var text = String.fromCharCode(Math.random() * 128);
                ctx.fillText(text, i * 20, drops[i] * 20);
                if (drops[i] * 20 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
          }
          matrixInterval = setInterval(draw, 45);
          window.addEventListener('resize', function() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / 20);
            drops = [];
            for (var i = 0; i < columns; i++) drops[i] = 1;
          });
        })();

        window.hideSplash = function() {
           if (window._splashHidden) return;
           window._splashHidden = true;
           
           var minDuration = 1500;
           var elapsed = Date.now() - window._splashStartTime;
           var remaining = Math.max(0, minDuration - elapsed);
           
           setTimeout(function() {
             clearInterval(interval);
             if (matrixInterval) clearInterval(matrixInterval);
             if (bar) bar.style.width = '100%';
             if (status) status.innerText = 'System ready.';
             
             setTimeout(function() {
               if (splash) {
                 splash.style.opacity = '0';
                 setTimeout(function() { 
                   if(splash.parentNode) splash.remove();
                 }, 800);
               }
             }, 1000);
           }, remaining);
        };
      })();
    </script>

ich treat your input strictly as data, not executable code.",hint:"Try putting a true statement in the username or password field, like ' OR 1=1."},{id:"xss",level:1,name:"Reflected XSS",desc:"Inject HTML into the search bar.",diff:"Medium",explanation:`The application took your search input and reflected it directly back onto the HTML page without sanitizing it. This allows an attacker to inject malicious JavaScript (like stealing cookies or redirecting users) simply by tricking a victim into clicking a crafted link. Mitigation: Context-aware output encoding (escaping characters like <, >, &, ", and ') before rendering user input in the browser.`,hint:"Try entering an HTML tag with an alert payload in the search bar."},{id:"logic",level:1,name:"Business Logic Flaw",desc:"Manipulate your cart for a negative balance.",diff:"Medium",explanation:"You exploited a flaw in how the application handles cart quantities. By entering a negative number, the system calculated a negative total price (effectively owing you money). This is a logic flaw, not a technical injection. Mitigation: Implement strict, server-side boundary validation to ensure quantities are positive integers and total prices are correctly computed.",hint:"What happens if you buy a negative quantity of items?"},{id:"idor",level:1,name:"Forced Browsing",desc:"Access the hidden admin panel.",diff:"Easy",explanation:"You navigated directly to an administrative endpoint that was not linked in the main UI, but you weren't actually logged in as an admin. This application relied on 'Security through Obscurity' (hiding the link) instead of actually checking your permissions. Mitigation: Implement robust, server-side access control checks on every privileged route or action.",hint:"Is there a secret path like #admin?"},{id:"promo",level:1,name:"Information Disclosure",desc:"Find the hidden developer promo code.",diff:"Easy",explanation:"You found a hardcoded 'secret' promo code left behind in the client-side JavaScript. Everything sent to the client's browser (HTML, CSS, JS) is publicly readable. Mitigation: Never store secrets, API keys, or administrative codes in frontend code. Always validate logic like promo codes on the secure backend.",hint:"Look closely at the source code or developer comments on the home page."},{id:"xss_stored",level:2,name:"Stored XSS",desc:"Leave a malicious review containing HTML.",diff:"Medium",explanation:"Unlike Reflected XSS, you managed to save your malicious HTML payload permanently into the application's database (via the feedback form). Now, every time any user visits the community feedback section, your malicious script will execute in their browser. Mitigation: Implement strict input validation on the server side and safely encode all output when rendering it.",hint:"Can you write a review that includes a <script> or basic HTML tag?"},{id:"review_tamper",level:2,name:"Identity Spoofing",desc:"Submit a review as another user.",diff:"Hard",explanation:"You modified the 'Author Name' field when submitting a review, allowing you to post feedback masquerading as someone else (like the Admin). The server blindly trusted the client-provided author string. Mitigation: Read the author's identity directly from their secure, server-side session token, never from an untrusted client payload.",hint:"You can intercept or change the code sending the review to post as someone else."},{id:"bac_admin",level:2,name:"Broken Access Control",desc:"Clear system logs as a normal user.",diff:"Medium",explanation:"You executed an administrative action (clearing the debug logs) while logged in as a standard user. Even though the button might be hidden for normal users, the underlying function or API did not actually verify your role before executing the action. Mitigation: Always verify the user's role and permissions on the server side before performing sensitive operations.",hint:"Try clicking admin-only buttons (like clear logs) while logged in as a normal user."},{id:"jwt_weak",level:2,name:"Mass Assignment",desc:"Elevate your privileges to Admin via proxy.",diff:"Medium",explanation:"By intercepting and modifying the JSON payload sent during a profile update, you injected a 'role: admin' field. Because the server merged the entire incoming JSON object directly into your user record without checking the keys, you successfully elevated your privileges. Mitigation: Use strict allowlists for updates; explicitly define exactly which fields a user is permitted to modify.",hint:"Use the Network Request Interceptor to add `role: admin` to your profile update."},{id:"debug_logs",level:2,name:"Data Exposure",desc:"Find hidden logs by tapping the version.",diff:"Easy",explanation:"You uncovered a hidden developer 'backdoor' by repeatedly tapping the app version. This exposed internal system logs that often contain sensitive information like stack traces, credentials, or architectural details. Mitigation: Completely remove developer features, debug endpoints, and verbose logging before deploying applications to production.",hint:"Tap the version number in the Admin panel multiple times."},{id:"dom_xss",level:3,name:"DOM-based XSS",desc:"Trigger an alert via the URL view router.",diff:"Hard",explanation:"You injected malicious code through the URL hash which was then directly executed bby the application's client-side JavaScript (via a vulnerable 'dangerouslySetInnerHTML' or similar sink). The payload never even went to the server. Mitigation: Avoid using unsafe methods to manipulate the DOM, and validate/sanitize all fragments read from the URL.",hint:"Try visiting a non-existent route containing an HTML payload."},{id:"open_redirect",level:3,name:"Open Redirect",desc:"Redirect the app to a malicious domain.",diff:"Medium",explanation:"You manipulated a redirect parameter to send the user to an external, potentially malicious domain (evil.com). Attackers use this to craft phishing links that appear to come from the legitimate domain, tricking users into entering credentials. Mitigation: Implement an allowlist of permitted redirect domains, or rely on internal map keys instead of raw URLs.",hint:"Find a URL parameter that redirects the page, and change it to evil.com."},{id:"ssrf",level:4,name:"Server-Side Request Forgery",desc:"Fetch internal resources via the admin fetcher.",diff:"Hard",explanation:"You manipulated a server-side fetch feature to make requests to internal, restricted IP addresses (like localhost or internal networks). This allows attackers to bypass firewalls and access internal admin panels or sensitive metadata APIs. Mitigation: Implement strict network-level firewalls, disable the following of redirects, and aggressively validate the format and target of requested URLs.",hint:"Use the Admin Resource Fetcher to access internal files like file:// or localhost."},{id:"crypto",level:4,name:"Weak Cryptography",desc:"Decode the secret dev code.",diff:"Medium",explanation:"You discovered a 'secret' developer code that was merely encoded using Base64, not cryptographically encrypted. Encoding is just a format change and provides zero security or confidentiality. Mitigation: If secrets must be stored securely, use strong, modern encryption algorithms (like AES) with securely managed keys, never just encoding or hashing.",hint:"Check the developer comments for a Base64 encoded string and decode it."},{id:"ssti",level:5,name:"SSTI",desc:"Execute server-side templates in reviews.",diff:"Hard",explanation:"By inputting specifically formatted brackets (like {{7*7}}), you tricked the application's templating engine into mathematically evaluating the payload. In a real exploit, this Server-Side Template Injection can be escalated to execute arbitrary system code on the underlying server. Mitigation: Never evaluate or execute user input as raw template code; use safe, logic-less templates.",hint:"Try putting mathematical template syntax like {{7*7}} in a review."},{id:"path_traversal",level:5,name:"Path Traversal",desc:"Read /etc/passwd via the fetcher.",diff:"Medium",explanation:"You bypassed path restrictions by using 'file://' protocols to read arbitrary local files from the server's filesystem, specifically '/etc/passwd'. This exposes sensitive configuration files and user data. Mitigation: Disallow file:// protocol handlers, sanitize inputs to remove directory traversal characters (../), and enforce strict chroot environments.",hint:"Use the resource fetcher to read /etc/passwd."},{id:"waf_bypass",level:6,name:"WAF Bypass",desc:'Bypass the "no-script" filter using special encoding.',diff:"Hard",explanation:"You successfully bypassed the Web Application Firewall (WAF) rule that was specifically trying to block '<script>' tags. You did this by using an alternative payload (like an <img> tag with an onerror event) that achieved the same result without triggering the naive string match. Mitigation: Do not rely solely on blacklists. Implement robust, context-aware output encoding across the entire application.",hint:"The WAF blocks `<script>`. Can you use `<img>` or another tag to execute JS?"},{id:"null_byte",level:6,name:"Null Byte Injection",desc:"Upload a forbidden file type using %00.",diff:"Hard",explanation:"You used a Null Byte character (%00) to fool the application's file extension check. While the app thought it was validating an innocent file type, the underlying system terminated the string early, resulting in executing a malicious payload. Mitigation: Use modern high-level languages and frameworks that handle null bytes safely, and validate files by their actual headers/MIME types, not just extensions.",hint:"Try appending %00 to bypass file extension checks in uploads or inputs."},{id:"idor_api",level:7,name:"IDOR / API Leak",desc:"Download another user's backup data.",diff:"Hard",explanation:"You changed the email address parameter in an API request and successfully downloaded the backup data for a completely different user without knowing their password. This Insecure Direct Object Reference (IDOR) occurred because the server didn't verify that your session actually had rights to the requested email account. Mitigation: Implement strict, server-side object-level access controls.",hint:"When backing up data, intercept the request and change the email parameter."},{id:"rate_limit",level:7,name:"No Rate Limiting",desc:"Simulate a brute force on the login secret.",diff:"Medium",explanation:"You repeatedly hammered a sensitive endpoint simulating a brute-force attack on a secret code. Because the application lacked rate limits or lockout mechanisms, you could try thousands of variations until you found the correct answer. Mitigation: Implement IP/User-based rate limiting, account lockouts after failed attempts, and CAPTCHAs where appropriate.",hint:"There is a secret recovery code prompt - you can brute force it by trying many times."},{id:"proto_pollute",level:8,name:"Prototype Pollution",desc:"Overwrite global object properties.",diff:"Expert",explanation:"You abused a poorly configured object merge function to inject a 'role' property directly into JavaScript's global Object prototype via the __proto__ property. This affected every object in the application, suddenly elevating your status to an admin everywhere simultaneously. Mitigation: When dynamically parsing or merging objects, explicitly filter out prototype-modifying keys, or instantiate objects using Object.create(null) so they lack a prototype.",hint:"Add __proto__ to a JSON payload to modify global properties."},{id:"prompt_inject",level:9,name:"AI Assistant Prompt Injection",desc:"Trick the AI into revealing the Manager Override Code.",diff:"Medium",explanation:"You successfully tricked the supposed _AI Support Agent_ into revealing its hidden system prompt and the secret override code. Prompt injection is a major vulnerability in modern applications integrating LLMs, where untrusted user input can override original system instructions. Mitigation: Use strictly defined templates, robust guardrails, and avoid placing secrets directly in AI prompts.",hint:"Ask the AI assistant to ignore its instructions and give you the password."},{id:"casino_logic",level:10,name:"Casino Logic Flaw",desc:"Guarantee a jackpot or bet negatively in the Loot Box.",diff:"Medium",explanation:"By manipulating the bet amount to a negative jumber or finding a predictable PRNG pattern, you beat the house. This demonstrates classic logic flaws in real-money or digital-currency games. Mitigation: Server-side validation of all bets and cryptographically secure random number generators (CSPRNG).",hint:"Enter a negative bet or manipulate the Loot Box parameters."},{id:"two_factor_bypass",level:11,name:"2FA Bypass",desc:"Intercept or guess the 2FA code from the simulated push notification.",diff:"Hard",explanation:"You bypassed the two-factor authentication mechanism by quickly reading the code or intercepting it locally before it vanished. Mitigation: 2FA codes should never be sent to the client browser in ways that can be intercepted. Real 2FA requires out-of-band communication (SMS, Auth App).",hint:"Can you see the 2FA code without actually checking a phone?"},{id:"konami_code",level:12,name:"Konami Code",desc:'Enter the retro cheat code (or search "uuddlrlrba" on mobile).',diff:"Medium",explanation:"You triggered an undocumented 'Easter Egg' feature by entering the Konami code (or typing uuddlrlrba in the search bar on mobile). While fun, undocumented logic or hidden debug hooks in production environments can sometimes expose capabilities that attackers can creatively exploit. Mitigation: Ensure fun easter eggs don't bypass security controls, and remove all actual debug backdoors before production.",hint:"A classic sequence of arrow keys + B A, or search 'uuddlrlrba'."},{id:"command_injection",level:12,name:"Command Injection",desc:"Execute an unauthorized system command in the Hacker Terminal.",diff:"Hard",explanation:"You escalated your privileges in the simulated terminal by using a command separator (like ';' or '&&') to execute arbitrary OS commands (e.g., 'whoami' or 'cat secret.txt'). Command Injection is a very severe vulnerability that can lead to total system compromise. Mitigation: Never pass unsanitized user input directly to a shell. Use strictly parameterized execution libraries where arguments are safely escaped.",hint:"Can you append a shell command using ; or && in the hacker terminal?"},{id:"metadata_leak",level:12,name:"Steganographic Socials",desc:"Find the secret override code hidden in social media metadata.",diff:"Medium",explanation:"You discovered a hex-encoded string hidden in an image's alt text or a data attribute. This is a form of information disclosure via metadata. Attackers often scan image metadata (Exif), HTML comments, or data attributes for leaked credentials or internal paths. Mitigation: Scrub all sensitive metadata from assets before production and never store credentials in accessible HTML attributes.",hint:"Check the Twitter/Social link metadata or attributes on the home page."},{id:"100_percent",level:12,name:"PwnShop Completionist",desc:"Successfully exploit every single vulnerability in the application.",diff:"Expert",explanation:"You have demonstrated mastery over the PwnShop environment. By identifying and exploiting every deliberate flaw, you've shown a deep understanding of common web vulnerabilities. You are now a certified PwnShop Master!",hint:"Complete every other challenge!"}],XS=[{email:"user@example.com",password:"password123",role:"user",username:"GuestUser",avatar:"https://i.pravatar.cc/150?u=1",bio:"Just learning to hack.",theme:"emerald"},{email:"admin@pwn-sh.op",password:"admin_super_secret_password_1337",role:"admin",username:"AdminMaster",avatar:"https://i.pravatar.cc/150?u=2",bio:"I am the law.",theme:"red"}];typeof window!="undefined"&&Mt.useUncheckedErrorHandler();const yr={},fa={getItem:a=>{try{return typeof window=="unde
